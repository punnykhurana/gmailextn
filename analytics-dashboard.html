<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firki Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Google Sans', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #4f46e5;
            font-size: 32px;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 16px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
        }

        .stat-card h3 {
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            color: #1e293b;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-card .change {
            color: #059669;
            font-size: 14px;
            font-weight: 500;
        }

        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            margin-bottom: 20px;
        }

        .chart-container h3 {
            color: #1e293b;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .feature-usage {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .feature-name {
            color: #374151;
            font-weight: 500;
        }

        .feature-count {
            color: #4f46e5;
            font-weight: 600;
            font-size: 18px;
        }

        .refresh-btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            background: #3730a3;
        }

        .last-updated {
            color: #64748b;
            font-size: 14px;
            text-align: center;
            margin-top: 20px;
        }

        .loading {
            text-align: center;
            color: #64748b;
            font-style: italic;
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Firki Analytics Dashboard</h1>
            <p>Beta Testing Analytics - Real-time usage data</p>
        </div>

        <button class="refresh-btn" onclick="loadAnalytics()">🔄 Refresh Data</button>

        <div id="loading" class="loading">Loading analytics data...</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="stats" class="stats-grid" style="display: none;">
            <div class="stat-card">
                <h3>Total Events</h3>
                <div class="value" id="totalEvents">0</div>
                <div class="change">All time</div>
            </div>
            <div class="stat-card">
                <h3>Active Sessions</h3>
                <div class="value" id="sessions">0</div>
                <div class="change">Unique users</div>
            </div>
            <div class="stat-card">
                <h3>Search Generated</h3>
                <div class="value" id="searchGenerated">0</div>
                <div class="change">Boolean searches</div>
            </div>
            <div class="stat-card">
                <h3>AI Performance</h3>
                <div class="value" id="aiPerformance">0</div>
                <div class="change">AI operations</div>
            </div>
        </div>

        <div id="featureUsage" class="chart-container" style="display: none;">
            <h3>Feature Usage Breakdown</h3>
            <div class="feature-usage" id="featureList">
                <!-- Feature items will be populated here -->
            </div>
        </div>

        <div class="last-updated" id="lastUpdated"></div>
    </div>

    <script>
        const ANALYTICS_ENDPOINT = 'http://localhost:5001/analytics/summary';

        async function loadAnalytics() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const stats = document.getElementById('stats');
            const featureUsage = document.getElementById('featureUsage');

            loading.style.display = 'block';
            error.style.display = 'none';
            stats.style.display = 'none';
            featureUsage.style.display = 'none';

            try {
                const response = await fetch(ANALYTICS_ENDPOINT);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Update stats
                document.getElementById('totalEvents').textContent = data.total_events;
                document.getElementById('sessions').textContent = data.sessions;
                document.getElementById('searchGenerated').textContent = data.search_generated;
                document.getElementById('aiPerformance').textContent = data.ai_performance;

                // Update feature usage
                const featureList = document.getElementById('featureList');
                featureList.innerHTML = '';

                if (data.feature_usage && Object.keys(data.feature_usage).length > 0) {
                    Object.entries(data.feature_usage)
                        .sort(([,a], [,b]) => b - a)
                        .forEach(([feature, count]) => {
                            const featureItem = document.createElement('div');
                            featureItem.className = 'feature-item';
                            featureItem.innerHTML = `
                                <span class="feature-name">${feature}</span>
                                <span class="feature-count">${count}</span>
                            `;
                            featureList.appendChild(featureItem);
                        });
                } else {
                    featureList.innerHTML = '<div style="color: #64748b; text-align: center; grid-column: 1/-1;">No feature usage data yet</div>';
                }

                // Update last updated time
                const lastUpdated = document.getElementById('lastUpdated');
                if (data.last_updated) {
                    const date = new Date(data.last_updated);
                    lastUpdated.textContent = `Last updated: ${date.toLocaleString()}`;
                }

                // Show data
                loading.style.display = 'none';
                stats.style.display = 'grid';
                featureUsage.style.display = 'block';

            } catch (err) {
                console.error('Error loading analytics:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = `Failed to load analytics: ${err.message}`;
            }
        }

        // Load analytics on page load
        document.addEventListener('DOMContentLoaded', loadAnalytics);

        // Auto-refresh every 30 seconds
        setInterval(loadAnalytics, 30000);
    </script>
</body>
</html>
