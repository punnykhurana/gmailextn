<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#2d5a5a" stroke="#1a3a3a" stroke-width="2"/>
  
  <!-- Firki symbol - simplified version similar to Greenhouse -->
  <!-- Main larger circle (bottom) -->
  <circle cx="64" cy="75" r="18" fill="#4a7c59" stroke="#2d5a5a" stroke-width="2"/>
  
  <!-- Smaller circle (top) -->
  <circle cx="64" cy="45" r="12" fill="#4a7c59" stroke="#2d5a5a" stroke-width="2"/>
  
  <!-- Connecting line between circles -->
  <line x1="64" y1="57" x2="64" y2="67" stroke="#4a7c59" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Small dot above top circle -->
  <circle cx="64" cy="25" r="4" fill="#4a7c59"/>
  
  <!-- Connecting line to dot -->
  <line x1="64" y1="33" x2="64" y2="41" stroke="#4a7c59" stroke-width="3" stroke-linecap="round"/>
</svg> 